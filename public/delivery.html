<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>UNICAFE – Delivery Dashboard</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>

<nav class="navbar">
  <div class="navbar-brand">☕ <span>UNI</span>CAFE</div>
  <div class="navbar-right">
    <span class="user-name" id="nav-user"></span>
    <button class="btn-logout" onclick="logout()">Logout</button>
  </div>
</nav>

<div class="page">
  <div class="page-title">🚴 Delivery Dashboard</div>

  <!-- Stats -->
  <div class="stats-grid" id="stats-grid">
    <div class="stat-card"><div class="stat-val" id="s-active">-</div><div class="stat-label">Active Deliveries</div></div>
    <div class="stat-card"><div class="stat-val" id="s-total">-</div><div class="stat-label">Total Deliveries</div></div>
    <div class="stat-card"><div class="stat-val" id="s-earnings">-</div><div class="stat-label">Tips Earned (Rs.)</div></div>
  </div>

  <!-- Tabs -->
  <div class="section-tabs">
    <div class="section-tab active" onclick="switchSection('active',this)">📦 Active Orders</div>
    <div class="section-tab" onclick="switchSection('history',this)">📋 Delivery History</div>
  </div>

  <!-- Active Orders -->
  <div class="section-content active" id="sec-active">
    <div id="active-orders">
      <div class="empty-state"><div class="emoji">⏳</div>Loading...</div>
    </div>
  </div>

  <!-- History -->
  <div class="section-content" id="sec-history">
    <div id="history-list">
      <div class="empty-state"><div class="emoji">⏳</div>Loading...</div>
    </div>
  </div>
</div>

<script src="/utils.js"></script>
<script>
const user = requireRole('delivery');
if (user) document.getElementById('nav-user').textContent = user.name;

let activeOrders = [], historyOrders = [];

async function init() {
  await loadActiveOrders();
}

async function loadActiveOrders() {
  const orders = await apiFetch('/api/orders');
  activeOrders = orders.filter(o => o.status === 'out_for_delivery');
  
  // Update stats
  const history = await apiFetch('/api/delivery/history');
  historyOrders = history;
  document.getElementById('s-active').textContent = activeOrders.length;
  document.getElementById('s-total').textContent = history.length;
  document.getElementById('s-earnings').textContent = history.length * 10;

  const el = document.getElementById('active-orders');
  if (!activeOrders.length) {
    el.innerHTML = '<div class="empty-state"><div class="emoji">🎉</div>No active deliveries. All clear!</div>';
    return;
  }
  el.innerHTML = activeOrders.map(o => `
    <div class="delivery-order-card">
      <div class="delivery-order-header">
        <div>
          <strong>Order #${o.id}</strong> – ${o.cafe_name}
          <div class="text-muted">Student: ${o.student_name}</div>
          <div class="text-muted">📍 Room: <strong>${o.room_no||'N/A'}</strong></div>
          <div class="text-muted">Ordered: ${fmtDate(o.created_at)}</div>
        </div>
        <div style="text-align:right">
          ${statusBadge(o.status)}
          <div style="font-weight:800;color:var(--latte);margin-top:4px">Rs. ${o.total_amount}</div>
        </div>
      </div>
      <div class="text-muted mb-1" style="font-size:0.82rem">
        Items: ${o.items.map(i=>`${i.item_name} x${i.quantity}`).join(', ')}
      </div>
      ${o.special_instructions ? `<div class="text-muted" style="font-size:0.82rem">Note: ${o.special_instructions}</div>` : ''}
      <div class="mt-1">
        <button class="btn btn-success" onclick="markDelivered(${o.id})">✓ Mark as Delivered</button>
      </div>
    </div>
  `).join('');
}

async function markDelivered(orderId) {
  try {
    await apiFetch(`/api/orders/${orderId}/status`, { method:'PUT', body: JSON.stringify({status:'delivered'}) });
    showToast('Order marked as delivered! +Rs. 10 tip 🎉', 'success');
    loadActiveOrders();
  } catch(e) { showToast(e.message,'error'); }
}

async function loadHistory() {
  const el = document.getElementById('history-list');
  if (!historyOrders.length) {
    el.innerHTML = '<div class="empty-state"><div class="emoji">📋</div>No deliveries yet</div>';
    return;
  }
  el.innerHTML = historyOrders.map(o => `
    <div class="delivery-order-card">
      <div class="delivery-order-header">
        <div>
          <strong>Order #${o.id}</strong> – ${o.cafe_name}
          <div class="text-muted">Student: ${o.student_name} · Room: ${o.room_no||'-'}</div>
          <div class="text-muted">Delivered: ${fmtDate(o.delivered_at)}</div>
          <div class="text-muted" style="font-size:0.82rem">${o.items.map(i=>`${i.item_name} x${i.quantity}`).join(', ')}</div>
        </div>
        <div style="text-align:right">
          ${statusBadge('delivered')}
          <div style="font-weight:800;color:var(--latte);margin-top:4px">Rs. ${o.total_amount}</div>
          <div style="color:var(--success);font-size:0.8rem">+Rs. 10 tip</div>
        </div>
      </div>
    </div>
  `).join('');
}

function switchSection(sec, el) {
  document.querySelectorAll('.section-tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.section-content').forEach(s=>s.classList.remove('active'));
  if(el) el.classList.add('active');
  document.getElementById('sec-'+sec).classList.add('active');
  if(sec==='history') loadHistory();
}

// Auto-refresh every 20s
setInterval(() => { loadActiveOrders(); }, 20000);

init();
</script>
</body>
</html>
